<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h2 {
            border: 1px solid white;
            padding: 10px;
            margin-bottom: 0;
        }

        .search {
            display: flex;
            align-items: center;
        }

        .search input {
            width: 100%;
            height: 50px;
            margin: 15px 0;
            border: 0;
        }

        .search button {
            width: 60px;
            height: 50px;
            border: 0;
        }

        table {
            width: 100%;
        }

        table th,
        table td {
            border: 1px solid white;
            padding: 10px;
            text-align: center;
        }

        table td img {
            height: 150px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <a href="index.html">
                    <img src="banner.png">
                </a>
            </div>
        </div>
        <div>
            <h2 style="text-align:center;">🏆 랭킹</h2>

            <div class="search">
                <input id="keyword" type="text" onkeydown="keypress(event)">
                <button onclick="search()">검색</button>
            </div>

            <table id="data">
                <thead>
                    <tr>
                        <th>사진</th>
                        <th>이름</th>
                        <th>설명</th>
                        <th>어택</th>
                        <th>HP</th>
                        <th>난이도</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function keypress(e) {
            if (e.key === 'Enter') {
                search();
            }
        }

        function search() {
            let myKeyword = document.querySelector("#keyword").value;

            let url = "https://ddragon.leagueoflegends.com/cdn/16.10.1/data/ko_KR/champion.json";

            fetch(url).then(d1 => {
                d1.json().then(d2 => {
                    let result = [];
                    let champions = Object.keys(d2.data);

                    for (let i = 0; i < champions.length; i++) {
                        let name = champions[i];

                        if (d2.data[name].blurb.includes(myKeyword) || d2.data[name].name.includes(myKeyword)) {
                            result.push({
                                image: d2.data[name].image.full,
                                blurb: d2.data[name].blurb,
                                name: d2.data[name].name,
                                attack: d2.data[name].stats.attackdamage,
                                hp: d2.data[name].stats.hp,
                                difficulty: d2.data[name].info.difficulty,
                            })
                        }
                    }

                    result.sort((a, b) => b.difficulty - a.difficulty);

                    let b = "";

                    for (let id = 0; id < result.length; id++) {
                        b = b + `
                        <tr>
                            <td>
                                <img src="https://ddragon.leagueoflegends.com/cdn/15.22.1/img/champion/${result[id].image}">
                                </td>
                            <td>${result[id].name}</td>
                            <td>${result[id].blurb.replace(myKeyword, '<span style="background-color:red;color:white">' + myKeyword + '</span>')}</td>
                            <td>${result[id].attack}</td>
                            <td>${result[id].hp}</td>
                            <td>${result[id].difficulty}</td>
                        </tr>
                    `;
                    }

                    document.querySelector("#data")
                        .querySelector("tbody")
                        .innerHTML = b;
                });
            });
        }

        search();
    </script>
</body>

</html>
