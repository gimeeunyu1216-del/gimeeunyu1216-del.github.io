<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h2 {
            border: 1px solid white;
            padding: 10px;
            margin-bottom: 0;
        }

        table {
            width: 100%;
        }

        table th,
        table td {
            border: 1px solid white;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <a href="index.html">
                    <img src="banner.png">
                </a>
            </div>
        </div>
        <div>
            <h2 style="text-align:center;">🏆 랭킹</h2>
            <table id="data">
                <thead>
                    <tr>
                        <th>순위</th>
                        <th>닉네임</th>
                        <th>점수</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let champs = [
            {
                nickname: "비에고",
                points: 500,
            }
            , {
                nickname: "아리",
                points: 410
            }
            , {
                nickname: "아트록스",
                points: 300
            }
            , {
                nickname: "에코",
                points: 200
            }
            , {
                nickname: "신짜오",
                points: 150
            }
        ];


        let b = "";

        for (let id = 0; id < champs.length; id++) {
            b = b + `
            <tr>
                <td>${id + 1}</td>
                <td>${champs[id].nickname}</td>
                <td>${champs[id].points}</td>
            </tr>
            `;
        }

        document.querySelector("#data")
            .querySelector("tbody")
            .innerHTML = b;
    </script>
</body>

</html>
