<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            padding: 15px;
        }

        .header {
            margin-bottom: 15px;

        }

        .header .title img {
            width: 100%;

        }

        .header .points {
            display: flex;
            justify-content: space-between;
        }

        .word {
            font-size: 38px;
            background-color: rgba(174, 127, 239, 0.838);
            color: rgb(0, 0, 0);
            text-align: center;
            padding-top: 15px;
            margin-bottom: 20px;
            height: 55px;
        }

        .characters {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 5px;
        }

        .characters button {
            padding: 12px 0;
            background-color: rgb(229, 117, 239);
            font-size: 23px;
            width: 47px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <img src="banner.png">
            </div>
            <div class="points">
                <div class="remain"></div>
                <div class="total"></div>
            </div>
        </div>
        <div class="word"></div>
        <div class="characters">
            <button onclick="onButtonClick('a')">a</button>
            <button onclick="onButtonClick('b')">b</button>
            <button onclick="onButtonClick('c')">c</button>
            <button onclick="onButtonClick('d')">d</button>
            <button onclick="onButtonClick('e')">e</button>
            <button onclick="onButtonClick('f')">f</button>
            <button onclick="onButtonClick('g')">g</button>
            <button onclick="onButtonClick('h')">h</button>
            <button onclick="onButtonClick('i')">i</button>
            <button onclick="onButtonClick('j')">j</button>
            <button onclick="onButtonClick('k')">k</button>
            <button onclick="onButtonClick('l')">l</button>
            <button onclick="onButtonClick('m')">m</button>
            <button onclick="onButtonClick('n')">n</button>
            <button onclick="onButtonClick('o')">o</button>
            <button onclick="onButtonClick('p')">p</button>
            <button onclick="onButtonClick('q')">q</button>
            <button onclick="onButtonClick('r')">r</button>
            <button onclick="onButtonClick('s')">s</button>
            <button onclick="onButtonClick('t')">t</button>
            <button onclick="onButtonClick('u')">u</button>
            <button onclick="onButtonClick('v')">v</button>
            <button onclick="onButtonClick('w')">w</button>
            <button onclick="onButtonClick('x')">x</button>
            <button onclick="onButtonClick('y')">y</button>
            <button onclick="onButtonClick('z')">z</button>
        </div>
    </div>

    <script>
        let remainPoints = 100;
        let myPoints = getMyPoints();

        let words = [
            "apple",
            "banana",
            "orange",
            "grape",
            "peach",
            "cherry",
            "strawberry",
            "blueberry",
            "watermelon",
            "melon",
            "pineapple",
            "mango",
            "kiwi",
            "pear",
            "plum",
            "lemon",
            "lime",
            "coconut",
        ];

        let random = Math.floor(Math.random() * words.length); // 0부터 2까지 중 무작위 1개
        let answer = words[random]; // 이번 문제의 정답
        let before = "*".repeat(answer.length); // 이전에 입력했던 결과

        document.querySelector(".word").innerText = "*".repeat(answer.length);
        document.querySelector(".remain").innerText = "남은 점수: " + remainPoints;
        document.querySelector(".total").innerText = "나의 점수: " + myPoints;

        function getMyPoints() {
            let point = localStorage.getItem("myPoints");
            return Number(point);
        }

        function saveMyPoints(p) {
            localStorage.setItem("myPoints", myPoints + p);
        }

        function onButtonClick(x) {
            let now = "";

            for (let i = 0; i < answer.length; i++) {
                if (answer.charAt(i) === x) { // 같을 때
                    now = now + x;
                } else { // 다를 때
                    now = now + "*";
                }
            }

            let result = "";

            for (let i = 0; i < answer.length; i++) {
                if (now.charAt(i) === "*" && before.charAt(i) === "*") {
                    result = result + "*";
                } else if (now.charAt(i) !== "*") {
                    result = result + now.charAt(i);
                } else if (before.charAt(i) !== "*") {
                    result = result + before.charAt(i);
                }
            }

            if (before === result) {
                remainPoints = remainPoints - 10;

                if (remainPoints === 0) {
                    window.alert("실패했습니다. 다시 시작합니다.");
                    location.reload(); // 새로고침
                }

                document.querySelector(".remain").innerText = "남은 점수: " + remainPoints;
            }

            before = result;

            let element = document.querySelector(".word")
            element.innerText = result;

            if (result === answer) {
                alert("정답입니다. " + answer);

                saveMyPoints(remainPoints);

                location.reload(); // 새로고침
            }
        }
    </script>
</body>

</html>
