<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .buttons {
            display: flex;
            gap: 15px;
        }

        .buttons a {
            flex: 1;
        }

        .buttons a img {
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <img src="banner.png">
            </div>
        </div>
        <div class="buttons">
            <a href="play.html">
                <img src="play.png" alt="play">
            </a>
            <a href="rank.html">
                <img src="ranking.png" alt="ranking">
            </a>
            <a onclick="reset()">
                <img src="reset.png" alt="reset">
            </a>
        </div>
    </div>

    <script>
        function reset() {
            let result = confirm("초기화 하시겠습니까?")

            if (result) {
                localStorage.removeItem("myNickname");
                localStorage.removeItem("myPoints");
                alert("초기화 되었습니다.")
            }
        }
    </script>
</body>
