<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick="guessNumber()">game start</button>

    <script>
        let answer = Math.floor(Math.random() * 100) + 1

        function guessNumber() {
            let input = prompt("1부터 100 사이 숫자를 입력하세요.")

            if (input === null) {
                alert("게임 종료")
                return
            }

            input = Number(input);

            if (input === answer) {
                alert("정답입니다👌")
            }
            else if (input > answer) {
                alert("down👇")
                guessNumber()
            }
            else if (input < answer) {
                alert("up👆")
                guessNumber()
            }
        }
    </script>
</body>

</html>
