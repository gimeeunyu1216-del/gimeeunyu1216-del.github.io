<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>discord</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <div class="container">
            <div class="left">
                <div class="item">
                    <img src="img/Aatrox.png" alt="아트록스">
                </div>
                <div class="item">
                    <img src="img/Ahri.png" alt="아리">
                </div>
                <div class="item">
                    <img src="img/Garen.png" alt="가렌">
                </div>
                <div class="item">
                    <img src="img/Yunara.png" alt="유나라">
                </div>
                <div class="item">
                    <img src="img/Talon.png" alt="탈론">
                </div>
                <div class="item add">
                    <img src="img/plus.svg" alt="추가">
                </div>
            </div>
            <div class="right">
                <div class="banner">
                    <img src="img/banner.png" alt="베너">
                </div>
                <div class="explorer">
                    <div class="first">
                        <span>Explorers</span>
                        <img src="img/angle.svg" alt="꺽쇠">
                    </div>
                    <div class="second">
                        <span>142 Members</span>
                        <span class="circle"></span>
                        <span>Friends</span>
                    </div>
                    <div class="third">
                        <div class="search">
                            <input type="text" placeholder="Search">
                        </div>
                        <div class="add">
                            <img src="img/user-add.svg" alt="친구추가">
                        </div>
                    </div>
                </div>
                <div class="chat">
                    chat
                </div>
                <div class="planning">
                    planning
                </div>
                <div class="voice-channel">
                    voice-channel
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <div class="container">
            <div class="item">
                <img src="img/home.svg">
                <div> home </div>
            </div>
            <div class="item">
                <img src="img/bell.svg">
                <div>noti</div>
            </div>
            <div class="item">
                <img src="img/user.svg">
                <div>you</div>
            </div>
        </div>
    </div>
</body>

</html>
